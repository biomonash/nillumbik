basePath: /api/
definitions:
  github_com_biomonash_nillumbik_internal_db.ForestType:
    enum:
    - dry
    - wet
    type: string
    x-enum-varnames:
    - ForestTypeDry
    - ForestTypeWet
  github_com_biomonash_nillumbik_internal_db.Observation:
    properties:
      appearanceEnd:
        type: integer
      appearanceStart:
        type: integer
      confidence:
        type: number
      file:
        type: string
      id:
        type: integer
      method:
        $ref: '#/definitions/github_com_biomonash_nillumbik_internal_db.ObservationMethod'
      narrative:
        type: string
      siteId:
        type: integer
      speciesId:
        type: integer
      temperature:
        type: integer
      timestamp:
        type: string
    type: object
  github_com_biomonash_nillumbik_internal_db.ObservationMethod:
    enum:
    - audio
    - camera
    - observed
    type: string
    x-enum-varnames:
    - ObservationMethodAudio
    - ObservationMethodCamera
    - ObservationMethodObserved
  github_com_biomonash_nillumbik_internal_db.Site:
    properties:
      block:
        type: integer
      code:
        type: string
      forest:
        $ref: '#/definitions/github_com_biomonash_nillumbik_internal_db.ForestType'
      id:
        type: integer
      location:
        type: string
      name:
        type: string
      tenure:
        $ref: '#/definitions/github_com_biomonash_nillumbik_internal_db.TenureType'
    type: object
  github_com_biomonash_nillumbik_internal_db.Species:
    properties:
      commonName:
        type: string
      id:
        type: integer
      indicator:
        type: boolean
      native:
        type: boolean
      reportable:
        type: boolean
      scientificName:
        type: string
      taxa:
        $ref: '#/definitions/github_com_biomonash_nillumbik_internal_db.Taxa'
    type: object
  github_com_biomonash_nillumbik_internal_db.Taxa:
    enum:
    - bird
    - mammal
    - reptile
    type: string
    x-enum-varnames:
    - TaxaBird
    - TaxaMammal
    - TaxaReptile
  github_com_biomonash_nillumbik_internal_db.TenureType:
    enum:
    - public
    - private
    type: string
    x-enum-varnames:
    - TenureTypePublic
    - TenureTypePrivate
  internal_observation.ListObservationsResponse:
    properties:
      count:
        type: integer
      observations:
        items:
          $ref: '#/definitions/github_com_biomonash_nillumbik_internal_db.Observation'
        type: array
    type: object
  internal_observation.Observation:
    properties:
      appearanceIime:
        properties:
          end:
            type: integer
          start:
            type: integer
        type: object
      confidence:
        type: number
      id:
        type: integer
      indicator:
        type: boolean
      method:
        $ref: '#/definitions/github_com_biomonash_nillumbik_internal_db.ObservationMethod'
      narrative:
        type: string
      reportable:
        type: boolean
      siteId:
        type: integer
      speciesId:
        type: integer
      temperature:
        type: integer
      timestamp:
        type: string
    type: object
  internal_species.ObservedSpecies:
    properties:
      common_name:
        type: string
      id:
        type: integer
      observation_count:
        type: integer
      scientific_name:
        type: string
    type: object
  internal_species.ObservedSpeciesResponse:
    properties:
      species:
        items:
          $ref: '#/definitions/internal_species.ObservedSpecies'
        type: array
      total:
        type: integer
    type: object
  internal_stats.BlockResponse:
    properties:
      block:
        type: integer
      observationCount:
        type: integer
      speciesCount:
        type: integer
    type: object
  internal_stats.DashboardStatsResponse:
    properties:
      nativeSpeciesCount:
        type: integer
      observationCount:
        type: integer
      sitesCount:
        type: integer
      speciesCount:
        type: integer
    type: object
  internal_stats.ObservationByBlocksResponse:
    properties:
      blocks:
        items:
          $ref: '#/definitions/internal_stats.BlockResponse'
        type: array
    type: object
  internal_stats.ObservationBySitesResponse:
    properties:
      sites:
        items:
          $ref: '#/definitions/internal_stats.SiteResponse'
        type: array
    type: object
  internal_stats.ObservationOverviewResponse:
    properties:
      countByTaxa:
        additionalProperties:
          format: int64
          type: integer
        type: object
      nativeSpeciesCount:
        type: integer
      observationCount:
        type: integer
      speciesCount:
        type: integer
    type: object
  internal_stats.ObservationTimeSeriesResponse:
    properties:
      series:
        additionalProperties:
          items:
            $ref: '#/definitions/internal_stats.TimeSeriesPoint'
          type: array
        type: object
    type: object
  internal_stats.SiteResponse:
    properties:
      observationCount:
        type: integer
      siteCode:
        type: string
      speciesCount:
        type: integer
    type: object
  internal_stats.TimeSeriesPoint:
    properties:
      observationCount:
        type: integer
      speciesCount:
        type: integer
      timestamp:
        type: string
    type: object
host: localhost:8000
info:
  contact: {}
  description: This is the backend API for Nillumbik Shire project.
  title: Nillubim Shire API
  version: "1.0"
paths:
  /observations:
    get:
      consumes:
      - application/json
      description: List observations
      parameters:
      - default: 100
        description: Result limit
        in: query
        name: limit
        required: true
        type: integer
      - default: 0
        description: Result offset
        in: query
        name: offset
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_observation.ListObservationsResponse'
      summary: List observations
      tags:
      - observation
  /observations/{id}:
    get:
      consumes:
      - application/json
      description: Get the detail of an observation by ID
      parameters:
      - description: ID of the observation
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_observation.Observation'
      summary: Get Observation Detail
      tags:
      - observation
  /sites:
    get:
      consumes:
      - application/json
      description: List sites
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_biomonash_nillumbik_internal_db.Site'
            type: array
      summary: List sites
      tags:
      - site
  /sites/{code}:
    get:
      consumes:
      - application/json
      description: Get the detail of a site by ID
      parameters:
      - description: Code of the site
        in: path
        name: code
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_biomonash_nillumbik_internal_db.Site'
      summary: Get Site Detail
      tags:
      - site
  /species:
    get:
      consumes:
      - application/json
      description: list all species
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_biomonash_nillumbik_internal_db.Species'
            type: array
      summary: List species
      tags:
      - species
  /species/{id}:
    get:
      consumes:
      - application/json
      description: Get species detail
      parameters:
      - description: id of the species
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_biomonash_nillumbik_internal_db.Species'
      summary: Get species detail
      tags:
      - species
  /species/by-common-name/{name}:
    get:
      consumes:
      - application/json
      description: Get species detail by common name. Case insensitive. Underscores
        will be replaced with spaces.
      parameters:
      - description: name of the species. Case insensitive.
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_biomonash_nillumbik_internal_db.Species'
      summary: Get species detail by common name
      tags:
      - species
  /species/observed:
    get:
      consumes:
      - application/json
      description: List species observed within a date range, optionally filtered
        by site
      parameters:
      - description: Site code
        in: query
        name: siteCode
        type: string
      - description: Start timestamp (RFC3339 format)
        in: query
        name: from
        type: string
      - description: End timestamp (RFC3339 format)
        in: query
        name: to
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_species.ObservedSpeciesResponse'
      summary: List observed species
      tags:
      - species
  /stats/dashboard:
    get:
      consumes:
      - application/json
      description: Dashboard stats
      parameters:
      - description: Search start from
        format: date-time
        in: query
        name: from
        type: string
      - description: Search end to
        format: date-time
        in: query
        name: to
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_stats.DashboardStatsResponse'
      summary: Dashboard stats
      tags:
      - statistics
  /stats/observations:
    get:
      consumes:
      - application/json
      description: Observation overview
      parameters:
      - description: Search start from
        format: date-time
        in: query
        name: from
        type: string
      - description: Search end to
        format: date-time
        in: query
        name: to
        type: string
      - description: Filter by site block
        in: query
        name: block
        type: integer
      - description: Filter by site code
        in: query
        name: siteCode
        type: string
      - description: Filter by taxa
        in: query
        name: taxa
        type: string
      - description: Filter by species common_name
        in: query
        name: commonName
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_stats.ObservationOverviewResponse'
      summary: Observation overview
      tags:
      - statistics
  /stats/observations/blocks:
    get:
      consumes:
      - application/json
      description: Observation stats group by blocks
      parameters:
      - description: Search start from
        format: date-time
        in: query
        name: from
        type: string
      - description: Search end to
        format: date-time
        in: query
        name: to
        type: string
      - description: Filter by site block
        in: query
        name: block
        type: integer
      - description: Filter by site code
        in: query
        name: siteCode
        type: string
      - description: Filter by taxa
        in: query
        name: taxa
        type: string
      - description: Filter by species common name
        in: query
        name: commonName
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_stats.ObservationByBlocksResponse'
      summary: Observation stats group by blocks
      tags:
      - statistics
  /stats/observations/sites:
    get:
      consumes:
      - application/json
      description: Observation stats group by sites
      parameters:
      - description: Search start from
        format: date-time
        in: query
        name: from
        type: string
      - description: Search end to
        format: date-time
        in: query
        name: to
        type: string
      - description: Filter by site block
        in: query
        name: block
        type: integer
      - description: Filter by site code
        in: query
        name: siteCode
        type: string
      - description: Filter by taxa
        in: query
        name: taxa
        type: string
      - description: Filter by species common name
        in: query
        name: commonName
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_stats.ObservationBySitesResponse'
      summary: Observation stats group by sites
      tags:
      - statistics
  /stats/observations/timeseries:
    get:
      consumes:
      - application/json
      description: Observation time series
      parameters:
      - description: Search start from
        format: date-time
        in: query
        name: from
        type: string
      - description: Search end to
        format: date-time
        in: query
        name: to
        type: string
      - description: Filter by site block
        in: query
        name: block
        type: integer
      - description: Filter by site code
        in: query
        name: siteCode
        type: string
      - description: Filter by taxa
        in: query
        name: taxa
        type: string
      - description: Filter by species common name
        in: query
        name: commonName
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_stats.ObservationTimeSeriesResponse'
      summary: Observation time series
      tags:
      - statistics
  /storage/{key}:
    get:
      description: Get a file from object storage by key
      parameters:
      - description: File key
        in: path
        name: key
        required: true
        type: string
      produces:
      - application/octet-stream
      responses:
        "200":
          description: OK
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get a file
      tags:
      - storage
  /storage/upload:
    post:
      consumes:
      - multipart/form-data
      description: Upload a file to object storage
      parameters:
      - description: File to upload
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Upload a file
      tags:
      - storage
swagger: "2.0"
